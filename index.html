<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sekai Score Calculator</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1f2235] text-white flex items-center justify-center h-screen">

<div class="w-full max-w-3xl p-6">

  <!Score>
  <div class="mb-6">
    <p class="text-xs text-white/60">SCORE</p>
    <div class="flex justify-between items-center">
      <p id="score" class="text-5xl font-extrabold tracking-wider">0000</p>
      <p id="rank" class="text-3xl font-extrabold text-gray-400">F</p>
    </div>

    <div class="flex justify-between text-xs text-white/60 mt-1">
      <span>Highest Score Achievable</span>
      <span id="maxScore">0000</span>
    </div>
  </div>

  <!Progress>
  <div class="w-full h-2 bg-white/10 rounded-full mb-6 overflow-hidden">
    <div id="bar" class="h-full bg-gradient-to-r from-pink-400 to-purple-400" style="width:0%"></div>
  </div>

  <!Accuracy>
  <div class="flex justify-between mb-8 text-sm">
    <div>
      <p class="text-white/60 text-xs">ACCURACY</p>
      <p id="accuracy" class="font-semibold">0%</p>
    </div>
    <div id="status" class="text-right"></div>
  </div>

  <!Content>
  <div class="flex justify-between">

    <div class="space-y-2 w-1/2">
      <div class="flex justify-between border-b border-white/10 pb-1"><span class="text-white">PERFECT</span><input id="p" type="number" class="bg-transparent text-right w-20"/></div>
      <div class="flex justify-between border-b border-white/10 pb-1"><span class="text-pink-400">GREAT</span><input id="gr" type="number" class="bg-transparent text-right w-20"/></div>
      <div class="flex justify-between border-b border-white/10 pb-1"><span class="text-blue-400">GOOD</span><input id="g" type="number" class="bg-transparent text-right w-20"/></div>
      <div class="flex justify-between border-b border-white/10 pb-1"><span class="text-green-400">BAD</span><input id="b" type="number" class="bg-transparent text-right w-20"/></div>
      <div class="flex justify-between border-b border-white/10 pb-1"><span class="text-gray-400">MISS</span><input id="m" type="number" class="bg-transparent text-right w-20"/></div>
    </div>

    <div class="flex flex-col items-end justify-center w-1/2">
      <p class="text-xs text-white/60">HIGHEST COMBO ACHIEVABLE</p>
      <p id="combo" class="text-4xl font-bold">0000</p>
    </div>

  </div>

</div>

<script>
let prevScore = 0;

function getNum(id){
  const el = document.getElementById(id);
  return el && el.value !== '' ? Number(el.value) : 0;
}

function update() {
  const p = getNum('p');
  const gr = getNum('gr');
  const g = getNum('g');
  const b = getNum('b');
  const m = getNum('m');

  const total = p + gr + g + b + m;

  // SCORE SYSTEM
  const rawScore = p*3 + gr*2 + g*1;
  const score = Math.min(rawScore, 999999);
  const maxScore = total * 3;

  // ACCURACY
  const accuracy = total > 0
    ? ((p*10 + gr*7 + g*5) / (total*10)) * 100
    : 0;

  const faults = g + b + m;
  const hpLost = b*50 + m*75;

  const isAP = total>0 && gr===0 && g===0 && b===0 && m===0;
  const isFC = total>0 && !isAP && g===0 && b===0 && m===0;
  const isMastery = total>0 && !isAP && !isFC && breaks<=7;

  // RANK SYSTEM
  let rank = 'F';
  if (accuracy>=98 && faults<=7 && hpLost<1000) rank='S';
  else if (accuracy>=95 && faults<=15 && hpLost<1000) rank='A';
  else if (accuracy>=90 && hpLost<1000) rank='B';
  else if (accuracy>=85 && hpLost<3000) rank='C';
  else if (accuracy>=80 && hpLost<6000) rank='D';

  let color='text-gray-400';
  if(rank==='S') color='text-yellow-400';
  if(rank==='A') color='text-pink-400';
  if(rank==='B') color='text-blue-400';
  if(rank==='C'||rank==='D') color='text-green-400';

  if(isAP) color='text-white';
  else if(isFC) color='text-pink-400';
  else if(isMastery) color='text-purple-400';

  animateScore(score);

  document.getElementById('maxScore').textContent = maxScore.toString().padStart(maxScore>=100000?6:maxScore>=10000?5:4,'0');
  document.getElementById('accuracy').textContent = accuracy.toFixed(2)+'%';
  document.getElementById('combo').textContent = total.toString().padStart(4,'0');

  const rankEl = document.getElementById('rank');
  rankEl.textContent = rank;
  rankEl.className = 'text-3xl font-extrabold '+color;

  const status = document.getElementById('status');
  status.innerHTML='';
  if(isAP) status.innerHTML='<p class="text-white">ALL PERFECT</p>';
  else if(isFC) status.innerHTML='<p class="text-pink-400">FULL COMBO</p>';
  else if(isMastery) status.innerHTML='<p class="text-purple-400">MASTERY</p>';

  document.getElementById('bar').style.width = Math.min(accuracy,100)+'%';
}

function animateScore(target){
  const start = prevScore;
  const duration = 400;
  const startTime = performance.now();

  function frame(now){
    const progress = Math.min((now-startTime)/duration,1);
    const val = Math.floor(start + (target-start)*progress);

    document.getElementById('score').textContent =
      val.toString().padStart(val>=100000?6:val>=10000?5:4,'0');

    if(progress < 1) requestAnimationFrame(frame);
    else prevScore = target;
  }

  requestAnimationFrame(frame);
}

// SAFE EVENT BINDING
window.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('input').forEach(i => {
    i.addEventListener('input', update);
  });

  update();
});

</script>

</body>
</html>
